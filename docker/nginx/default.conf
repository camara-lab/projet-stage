# -----------------------------------------------------------
# Bus Booking - Vhost Nginx pour Symfony 7
# -----------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /var/www/symfony/public;
    index index.php;

    # Logs
    error_log  /var/log/nginx/bus_booking.error.log;
    access_log /var/log/nginx/bus_booking.access.log;

    client_max_body_size 64M;

    # -----------------------------------------------------------
    # Front Controller Pattern : tout passe par index.php
    # -----------------------------------------------------------
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # -----------------------------------------------------------
    # Exécution des scripts PHP via FastCGI (PHP-FPM container "app")
    # -----------------------------------------------------------
    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Empêche nginx d'exécuter n'importe quel .php (sécurité)
        internal;
    }

    # Tout autre .php est interdit : seul index.php est point d'entrée
    location ~ \.php$ {
        return 404;
    }

    # -----------------------------------------------------------
    # Sécurité : bloquer les fichiers sensibles
    # -----------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
