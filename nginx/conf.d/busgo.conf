# ─────────────────────────────────────────────────────────────────────────────
# BusGo — Nginx configuration production
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name busgo.ma www.busgo.ma;

    # ACME challenge pour Let's Encrypt (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS vhost principal ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name busgo.ma www.busgo.ma;

    # Certificats Let's Encrypt (gérés par certbot)
    ssl_certificate     /etc/letsencrypt/live/busgo.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/busgo.ma/privkey.pem;

    # Paramètres SSL modernes (TLS 1.2+ uniquement)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;

    # ── En-têtes de sécurité ──────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Taille maximale des requêtes ─────────────────────────────────────
    client_max_body_size 10M;

    # ── Fichiers statiques Symfony (public/) ─────────────────────────────
    root /var/www/symfony/public;

    # Assets statiques — cache agressif
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|otf|eot|css|js|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── API Symfony — FastCGI vers PHP-FPM ───────────────────────────────
    location /api {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass    symfony:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include         fastcgi_params;
        fastcgi_param   SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param   DOCUMENT_ROOT $realpath_root;
        fastcgi_param   HTTPS on;
        fastcgi_read_timeout 120;
        internal;
    }

    # ── Bloquer l'accès direct aux autres .php ───────────────────────────
    location ~ \.php$ {
        return 404;
    }

    # ── Frontend Next.js (tout le reste) ─────────────────────────────────
    location / {
        proxy_pass          http://frontend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60;
    }

    # ── Logs ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/busgo.access.log;
    error_log  /var/log/nginx/busgo.error.log warn;
}
