# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    # En production (HTTPS), les cookies doivent avoir l'attribut Secure.
    # Mettre COOKIE_SECURE=false en développement (HTTP).
    cookie_secure: '%env(bool:COOKIE_SECURE)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Injecter $cookieSecure dans les classes qui gèrent les cookies de refresh token
    App\EventSubscriber\LoginSuccessListener:
        arguments:
            $cookieSecure: '%cookie_secure%'

    App\Controller\AuthController:
        arguments:
            $cookieSecure: '%cookie_secure%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

when@test:
    parameters:
        cookie_secure: false

    services:
        _defaults:
            autowire: true
            autoconfigure: true
            public: true
        App\:
            resource: '../src/'
            exclude:
                - '../src/DependencyInjection/'
                - '../src/Dto/'
                - '../src/Entity/'
                - '../src/Enum/'
                - '../src/Exception/'
                - '../src/Kernel.php'

        App\EventSubscriber\LoginSuccessListener:
            arguments:
                $cookieSecure: false

        App\Controller\AuthController:
            arguments:
                $cookieSecure: false

        App\EventListener\RateLimitListener:
            autoconfigure: false
            tags: []
